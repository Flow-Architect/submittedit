name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  workspace:
    name: Workspace quality gates
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false
          version: 11.13.0

      - name: Install Node.js
        uses: actions/setup-node@v7
        with:
          cache: pnpm
          node-version: 22.22.2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run workspace checks
        run: pnpm check

  contracts:
    name: Monad Foundry checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install Monad Foundry bootstrapper
        run: |
          export FOUNDRY_DIR="$RUNNER_TEMP/monad-foundry"
          echo "FOUNDRY_DIR=$FOUNDRY_DIR" >> "$GITHUB_ENV"
          curl --fail --show-error --location https://foundry.category.xyz | bash

      - name: Install Monad Foundry
        run: '"$FOUNDRY_DIR/bin/foundryup" --network monad'

      - name: Check Solidity formatting
        working-directory: contracts
        run: '"$FOUNDRY_DIR/bin/forge" fmt --check'

      - name: Build contracts
        working-directory: contracts
        run: '"$FOUNDRY_DIR/bin/forge" build'

      - name: Test contracts
        working-directory: contracts
        run: '"$FOUNDRY_DIR/bin/forge" test'
