name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  workspace:
    name: Workspace quality gates
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/submittedit_test
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/submittedit_test
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: submittedit_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d submittedit_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false
          version: 11.13.0

      - name: Install Node.js
        uses: actions/setup-node@v7
        with:
          cache: pnpm
          node-version: 22.22.2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Monad Foundry for local relay tests
        run: |
          export RELAY_FOUNDRY_DIR="$RUNNER_TEMP/relay-monad-foundry"
          echo "RELAY_FOUNDRY_DIR=$RELAY_FOUNDRY_DIR" >> "$GITHUB_ENV"
          export FOUNDRY_DIR="$RELAY_FOUNDRY_DIR"
          curl --fail --show-error --location https://foundry.category.xyz | bash
          "$RELAY_FOUNDRY_DIR/bin/foundryup" --network monad

      - name: Install Chromium for extension tests
        run: pnpm exec playwright install --with-deps chromium

      - name: Apply web database migrations
        run: pnpm --filter @submittedit/web db:migrate

      - name: Run real local-chain relay integration
        run: >-
          ANVIL_BIN="$RELAY_FOUNDRY_DIR/bin/anvil"
          FORGE_BIN="$RELAY_FOUNDRY_DIR/bin/forge"
          pnpm test:relay-local-chain

      - name: Run real Chromium extension-to-relay integration
        run: >-
          ANVIL_BIN="$RELAY_FOUNDRY_DIR/bin/anvil"
          FORGE_BIN="$RELAY_FOUNDRY_DIR/bin/forge"
          pnpm test:extension-relay-local-chain

      - name: Run workspace checks
        run: pnpm check

      - name: Run remaining browser end-to-end checks
        run: SKIP_EXTENSION_RELAY_LOCAL_CHAIN=true pnpm test:e2e

  contracts:
    name: Monad Foundry checks
    runs-on: ubuntu-latest
    env:
      MONAD_TESTNET_RPC_URL: https://testnet-rpc.monad.xyz
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install Monad Foundry bootstrapper
        run: |
          export FOUNDRY_DIR="$RUNNER_TEMP/monad-foundry"
          echo "FOUNDRY_DIR=$FOUNDRY_DIR" >> "$GITHUB_ENV"
          curl --fail --show-error --location https://foundry.category.xyz | bash

      - name: Install Monad Foundry
        run: '"$FOUNDRY_DIR/bin/foundryup" --network monad'

      - name: Check deployment configuration
        working-directory: contracts
        run: |
          if env -u MONAD_TESTNET_RPC_URL "$FOUNDRY_DIR/bin/cast" chain-id --rpc-url monad_testnet > "$RUNNER_TEMP/missing-rpc.txt" 2>&1; then
            echo "Monad RPC configuration unexpectedly accepted a missing MONAD_TESTNET_RPC_URL."
            exit 1
          fi
          grep --fixed-strings "MONAD_TESTNET_RPC_URL" "$RUNNER_TEMP/missing-rpc.txt"
          "$FOUNDRY_DIR/bin/forge" config --json > "$RUNNER_TEMP/foundry-config.json"
          jq --exit-status '
            .solc == "0.8.30" and
            .optimizer == true and
            .optimizer_runs == 200 and
            .evm_version == "osaka" and
            .cbor_metadata == true and
            .bytecode_hash == "none" and
            .use_literal_content == true and
            .eth_rpc_url == "monad_testnet" and
            .rpc_endpoints.monad_testnet == "${MONAD_TESTNET_RPC_URL}"
          ' "$RUNNER_TEMP/foundry-config.json"
          "$FOUNDRY_DIR/bin/cast" chain-id --rpc-url monad_testnet > "$RUNNER_TEMP/chain-id.txt"
          grep --line-regexp "10143" "$RUNNER_TEMP/chain-id.txt"

      - name: Check Solidity formatting
        working-directory: contracts
        run: '"$FOUNDRY_DIR/bin/forge" fmt --check'

      - name: Lint Solidity
        working-directory: contracts
        run: '"$FOUNDRY_DIR/bin/forge" lint'

      - name: Build contracts
        working-directory: contracts
        run: '"$FOUNDRY_DIR/bin/forge" build --force'

      - name: Verify generated contract ABI
        working-directory: contracts
        run: node scripts/export-abi.mjs --check

      - name: Test contracts
        working-directory: contracts
        run: '"$FOUNDRY_DIR/bin/forge" test'

      - name: Check gas snapshot
        working-directory: contracts
        run: '"$FOUNDRY_DIR/bin/forge" snapshot --check --match-test "^testGas_"'
